services:
  - type: web
    name: faryal-al-hosary-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: faryal-al-hosary-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://faryal-al-hosary.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: faryal-al-hosary
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://faryal-al-hosary-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: faryal-al-hosary-db
    plan: starter
