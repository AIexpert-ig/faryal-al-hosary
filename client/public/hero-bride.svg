<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
  <!-- Stylized line-art bride silhouette -->
  <!-- Head -->
  <ellipse cx="150" cy="60" rx="28" ry="32" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Veil flowing right -->
  <path d="M 165 45 Q 220 20 260 60 Q 290 100 270 160 Q 250 120 220 100 Q 195 85 175 75" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Veil detail -->
  <path d="M 170 50 Q 230 10 270 55 Q 295 90 278 155" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <!-- Neck -->
  <line x1="140" y1="90" x2="137" y2="115" stroke="white" stroke-width="1.5"/>
  <line x1="160" y1="90" x2="163" y2="115" stroke="white" stroke-width="1.5"/>
  <!-- Shoulders -->
  <path d="M 100 120 Q 120 110 137 115 Q 150 118 163 115 Q 180 110 200 120" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Arms -->
  <path d="M 100 120 Q 85 145 80 175 Q 78 190 82 200" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M 200 120 Q 215 145 220 175 Q 222 190 218 200" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Bodice - fitted -->
  <path d="M 100 120 Q 95 145 98 165 Q 100 175 115 180 Q 135 183 150 183 Q 165 183 185 180 Q 200 175 202 165 Q 205 145 200 120" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Bodice detail - lace/embellishment lines -->
  <path d="M 118 125 Q 135 122 150 122 Q 165 122 182 125" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <path d="M 112 135 Q 135 132 150 131 Q 165 132 188 135" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <path d="M 108 148 Q 130 145 150 144 Q 170 145 192 148" fill="none" stroke="white" stroke-width="0.5" opacity="0.4"/>
  <!-- Waist seam -->
  <path d="M 110 178 Q 135 185 150 185 Q 165 185 190 178" fill="none" stroke="white" stroke-width="1" opacity="0.7"/>
  <!-- A-line skirt flowing outward dramatically -->
  <path d="M 110 178 Q 85 240 60 310 Q 35 385 20 465 Q 15 510 20 560 L 280 560 Q 285 510 280 465 Q 265 385 240 310 Q 215 240 190 178" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Skirt inner volume lines -->
  <path d="M 120 185 Q 100 250 80 330 Q 65 400 55 475" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <path d="M 150 186 Q 150 260 150 340 Q 150 420 148 510" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <path d="M 180 185 Q 200 250 220 330 Q 235 400 245 475" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <!-- Cathedral train suggestion -->
  <path d="M 20 560 Q 60 575 100 580 Q 150 583 200 580 Q 240 575 280 560" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Bouquet in hands (lower bodice area) -->
  <ellipse cx="155" cy="210" rx="18" ry="14" fill="none" stroke="white" stroke-width="1" opacity="0.7"/>
  <path d="M 145 205 Q 148 195 153 198" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <path d="M 152 202 Q 155 192 158 196" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <path d="M 159 205 Q 163 196 166 200" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <!-- Hair detail -->
  <path d="M 125 50 Q 122 35 135 30 Q 148 26 150 28" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <path d="M 175 50 Q 178 35 165 30" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Tiara suggestion -->
  <path d="M 133 42 L 135 32 L 140 38 L 150 28 L 160 38 L 165 32 L 167 42" fill="none" stroke="white" stroke-width="0.8" opacity="0.5"/>
</svg>
